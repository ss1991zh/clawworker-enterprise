<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Clawworker · 同态加密分析助手</title>
  <link rel="stylesheet" href="/static/app.css?v={{ asset_ver }}">
</head>
<body>
  <!-- ============ 侧栏:会话列表 ============ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__head">
      <div class="logo">爪</div>
      <div>
        <h1>Clawworker</h1>
        <p>同态加密 · 企业版</p>
      </div>
    </div>
    <button class="new-btn ic-btn" id="newBtn">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      新建会话
    </button>
    <div class="session-list" id="sessionList"></div>
    <div class="sidebar__foot">
      <span class="user-chip">{{ username }}</span>
      <button class="settings-btn" id="settingsBtn" title="设置">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
             stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </aside>
  <div class="scrim" id="scrim"></div>

  <!-- ============ 主区:Chat ============ -->
  <div class="panel">
    <div class="topbar">
      <button class="menu-btn" id="menuBtn">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <h2 id="topTitle">智能分析助手</h2>
      <button class="top-action" id="tasksBtn" title="定时任务" style="margin-left:auto;">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>
        </svg>
        <span>定时任务</span>
        <span class="badge-dot" id="tasksBadge" style="display:none;">0</span>
      </button>
      <button class="top-action" id="filesBtn" title="密文文件管理" style="margin-left:10px;">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        </svg>
        <span>密文文件</span>
      </button>
    </div>

    <main id="main">
      <div class="chat" id="chat">
        <div class="welcome" id="welcome">
          <div class="logo welcome-logo">爪</div>
          <div class="big">同态加密 · 数据分析助手</div>
          <div class="sub">明文不出本机 · 计算全程密文 · 输出 Excel 解密回本机</div>
          <div class="chips">
            <div class="chip">按大区统计销售目标完成率,完成档位涂色,导 Excel</div>
            <div class="chip">用 ARIMA + EWMA 预测未来 12 个月销量,看产品线</div>
            <div class="chip">算库存周转天数 + ABC 分类,标记呆滞物料</div>
            <div class="chip">月度回款率 TOP10 / BOTTOM10 排行</div>
          </div>
          <p class="welcome-hint">点击左侧 <strong>新建会话</strong> 开始 · 或选一条已有会话继续</p>
        </div>
      </div>
    </main>

    <footer>
      <div class="composer" id="composer">
        <!-- 已选密文 chip(本条消息附带的) -->
        <div class="attach-chips" id="attachChips"></div>

        <div class="composer-row">
          <button class="attach-btn" id="attachBtn" type="button" title="附件:数据(CSV/XLSX 自动加密) · 文本(TXT/MD/DOCX/PDF 等)直接送 LLM 读">
            <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
          </button>
          <input type="file" id="fileInput" hidden multiple
                 accept=".csv,.xlsx,.xls,.txt,.md,.markdown,.rst,.log,.text,.docx,.pdf,.rtf,.html,.htm,.json,.yml,.yaml">
          <textarea id="input" rows="1" placeholder="问问看 · 回车发送 · Shift+回车换行" disabled></textarea>
          <button class="send" id="sendBtn" disabled>发送</button>
        </div>
      </div>
    </footer>

    <div class="drop-overlay" id="dropOverlay">
      <div class="drop-overlay__box">
        <svg class="ic-up" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <span>松开鼠标 · 数据自动加密 / TXT·MD·DOCX·PDF 等文本直接送 LLM 阅读</span>
      </div>
    </div>
  </div>

  <!-- ============ 设置 Modal ============ -->
  <div class="modal-mask" id="modalMask">
    <div class="modal" style="position:relative;">
      <button class="modal__close" id="modalClose">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <nav class="modal__nav">
        <h3>设置</h3>
        <button class="tab-btn active" data-tab="general">连接 / 计算</button>
        <button class="tab-btn" data-tab="tasks">定时任务</button>
        <button class="tab-btn" data-tab="skills">Skill 管理</button>
        <button class="tab-btn" data-tab="keys">同态密钥</button>
        <button class="tab-btn" data-tab="account">账户</button>
      </nav>
      <div class="modal__body" id="modalBody"></div>
    </div>
  </div>

  <!-- ============ 密文文件管理 Modal(从顶栏入口打开) ============ -->
  <div class="modal-mask" id="filesMask">
    <div class="modal modal--single" style="position:relative;">
      <button class="modal__close" id="filesClose">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="modal__body" id="filesBody"></div>
    </div>
  </div>

  <script src="/static/app.js?v={{ asset_ver }}"></script>
</body>
</html>
